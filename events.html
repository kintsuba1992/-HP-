<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント情報 | にほん電脳横丁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════
       VARIABLES & RESET
    ══════════════════════════════════ */
    :root {
      --cyan:   #00ccff;
      --blue:   #0055ff;
      --violet: #8800cc;
      --gold:   #cc7700;
      --text:   #ddd4ff;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; }

    body {
      min-height: 100%;
      background-image: url('./bg_wide.jpg');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: rgba(3, 0, 18, 0.75);
      z-index: 0; pointer-events: none;
    }

    /* ══════════════════════════════════
       HAMBURGER MENU
    ══════════════════════════════════ */
    .menu-btn {
      position: fixed; top: 16px; right: 20px;
      z-index: 200; width: 44px; height: 44px;
      background: rgba(3, 0, 18, 0.85);
      border: 1px solid rgba(0, 150, 255, 0.4);
      border-radius: 8px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(0, 100, 255, 0.3);
    }
    .menu-btn:hover { border-color: var(--cyan); box-shadow: 0 0 18px rgba(0,200,255,0.5); }
    .menu-btn span {
      display: block; width: 22px; height: 2px;
      background: var(--cyan); border-radius: 2px;
      transition: all 0.3s ease; box-shadow: 0 0 6px var(--cyan);
    }
    .menu-btn.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    .drawer {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 190;
      background: rgba(3, 0, 18, 0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 2px solid rgba(0, 150, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 80, 0.6);
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 70px 0 24px;
    }
    .drawer.open { transform: translateY(0); }
    .drawer::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,150,255,0.8), rgba(150,0,255,0.8), transparent);
    }
    .drawer-item {
      display: block; padding: 14px 32px;
      text-decoration: none;
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.1rem; letter-spacing: 0.15em;
      color: rgba(185, 165, 255, 0.85);
      border-bottom: 1px solid rgba(100, 50, 200, 0.2);
      transition: all 0.2s ease;
    }
    .drawer-item::before { content: '◈'; margin-right: 12px; color: var(--cyan); font-size: 0.8rem; opacity: 0.7; }
    .drawer-item:hover { color: #fff; background: rgba(0,80,200,0.12); text-shadow: 0 0 10px var(--cyan); padding-left: 40px; }
    .drawer-item.top { color: rgba(200, 180, 255, 0.6); font-size: 0.9rem; }

    /* ══════════════════════════════════
       PAGE WRAPPER
    ══════════════════════════════════ */
    .page-wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding: 80px 5% 60px;
      display: flex; flex-direction: column;
    }

    /* ══════════════════════════════════
       PAGE TITLE
    ══════════════════════════════════ */
    .page-title { text-align: center; margin-bottom: 36px; }
    .page-title h1 {
      font-family: 'Shippori Mincho B1', serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 800;
      color: #fff; letter-spacing: 0.2em;
      text-shadow: 0 0 10px rgba(0,150,255,0.8), 0 0 30px rgba(100,0,255,0.5);
    }
    .page-title-line {
      width: 200px; height: 1px; margin: 16px auto 0;
      background: linear-gradient(90deg, transparent, rgba(0,160,255,0.7), rgba(160,0,255,0.7), transparent);
    }

    /* ══════════════════════════════════
       LUMA EMBED SECTION
    ══════════════════════════════════ */
    .luma-section {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── iframeコンテナ ── */
    .luma-container {
      width: 100%;
      background: rgba(5, 0, 25, 0.65);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 60, 255, 0.25);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .luma-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,160,255,0.6), rgba(160,0,255,0.6), transparent);
      z-index: 1;
    }

    .luma-iframe {
      width: 100%;
      height: 700px;
      border: none;
      display: block;
    }


    /* ── 過去イベントカード ── */
    .event-list {
      display: none;
      padding: 28px;
      min-height: 480px;
    }
    .event-list.visible { display: block; }
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .event-card {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
      background: rgba(0, 0, 30, 0.5);
      border: 1px solid rgba(100, 80, 200, 0.32);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .event-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0, 180, 255, 0.65);
      box-shadow: 0 0 18px rgba(0, 150, 255, 0.25);
    }
    .event-cover {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: rgba(0, 20, 60, 0.45);
    }
    .event-card-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
    }
    .event-date {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(0, 210, 255, 0.86);
    }
    .event-title {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      line-height: 1.55;
      color: #fff;
    }
    .event-meta {
      font-size: 0.82rem;
      line-height: 1.6;
      color: rgba(190, 180, 240, 0.78);
    }
    .event-empty {
      display: flex;
      min-height: 360px;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: rgba(190, 180, 240, 0.78);
      line-height: 1.9;
      font-family: 'Shippori Mincho B1', serif;
      letter-spacing: 0.08em;
    }
    /* ── ローディング表示 ── */
    .luma-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: rgba(3, 0, 18, 0.8);
      z-index: 2;
      transition: opacity 0.5s ease;
    }
    .luma-loading.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(0, 150, 255, 0.2);
      border-top-color: var(--cyan);
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.9rem; letter-spacing: 0.1em;
      color: rgba(160, 150, 210, 0.7);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── フォールバック ── */
    .luma-fallback {
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      padding: 60px 24px;
      text-align: center;
    }
    .luma-fallback.visible { display: flex; }
    .fallback-icon { font-size: 2.5rem; opacity: 0.6; }
    .fallback-msg {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1rem; letter-spacing: 0.1em;
      color: rgba(160, 150, 210, 0.75);
      line-height: 1.8;
    }
    .fallback-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .fallback-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 24px;
      text-decoration: none; font-size: 0.88rem; letter-spacing: 0.1em;
      transition: all 0.25s ease; border: 1px solid;
    }
    .fallback-btn.luma {
      border-color: rgba(255, 100, 50, 0.5); color: #ff8855;
      background: rgba(255, 80, 30, 0.1);
    }
    .fallback-btn.luma:hover { background: rgba(255, 80, 30, 0.2); box-shadow: 0 0 12px rgba(255,80,30,0.3); }
    .fallback-btn.telegram {
      border-color: rgba(0, 136, 204, 0.5); color: #29b6f6;
      background: rgba(0, 100, 180, 0.1);
    }
    .fallback-btn.telegram:hover { background: rgba(0, 100, 180, 0.2); box-shadow: 0 0 12px rgba(0,150,220,0.3); }

    /* ══════════════════════════════════
       TABS
    ══════════════════════════════════ */
    .tab-wrap {
      display: flex; gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      font-family: 'Shippori Mincho B1', serif;
      font-size: clamp(0.82rem, 1.4vw, 1rem);
      letter-spacing: 0.15em;
      color: rgba(180, 165, 255, 0.75);
      background: rgba(5, 0, 25, 0.65);
      border: 1px solid rgba(100, 60, 255, 0.25);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    .tab-btn:hover {
      color: #fff;
      border-color: rgba(0, 180, 255, 0.5);
      background: rgba(0, 50, 180, 0.15);
    }
    .tab-btn.active {
      color: #fff;
      background: rgba(0, 60, 200, 0.25);
      border-color: var(--cyan);
      box-shadow: 0 0 14px rgba(0, 150, 255, 0.35);
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
    }

    /* ══════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════ */
    @media (max-width: 768px) {
      body {
        background-image: url('./bg_portrait.jpg');
        background-position: top center;
      }
      .page-wrapper { padding: 70px 4% 50px; }
      .luma-iframe  { height: 560px; }
      .page-title h1 { font-size: 1.6rem; }
    }
    @media (max-width: 420px) {
      .luma-iframe { height: 480px; }
    }
  </style>
</head>
<body>

<!-- ── ハンバーガーボタン ── -->
<button class="menu-btn" id="menuBtn" aria-label="メニューを開く">
  <span></span><span></span><span></span>
</button>

<!-- ── ドロワーメニュー ── -->
<nav class="drawer" id="drawer">
  <a class="drawer-item top" href="index.html">◀ TOPへ戻る</a>
  <a class="drawer-item" href="about.html">にほん電脳横丁とは？</a>
  <a class="drawer-item" href="projects.html">横丁推しプロジェクト</a>
  <a class="drawer-item" href="events.html">イベント情報</a>
  <a class="drawer-item" href="contact.html">問い合わせ</a>
</nav>

<div class="page-wrapper">

  <div class="page-title">
    <h1>イ ベ ン ト 情 報</h1>
    <div class="page-title-line"></div>
  </div>

  <!-- ── タブ切り替え ── -->
  <div class="tab-wrap">
    <button class="tab-btn active" id="tabUpcoming" onclick="switchTab('upcoming')">
      今後のイベント
    </button>
    <button class="tab-btn" id="tabPast" onclick="switchTab('past')">
      過去のイベント
    </button>
  </div>

  <div class="luma-section">
    <div class="luma-container" id="lumaContainer">

      <!-- ローディング -->
      <div class="luma-loading" id="lumaLoading">
        <div class="loading-spinner"></div>
        <p class="loading-text">イベント情報を読み込み中...</p>
      </div>

      <!-- Luma iframe -->
      <iframe
        class="luma-iframe"
        id="lumaFrame"
        src="https://luma.com/embed/calendar/cal-X9BFj91zWwrWasK/events"
        allowfullscreen
        aria-hidden="false"
        tabindex="0"
        title="にほん電脳横丁 イベントカレンダー"
        sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-popups-to-escape-sandbox"
      ></iframe>


      <!-- 過去イベント（Luma API経由で表示） -->
      <div class="event-list" id="pastEvents" aria-live="polite"></div>
      <!-- フォールバック（JS制御） -->
      <div class="luma-fallback" id="lumaFallback">
        <div class="fallback-icon">📅</div>
        <p class="fallback-msg">
          イベント情報を読み込めませんでした。<br>
          以下のリンクから直接ご確認ください。
        </p>
        <div class="fallback-buttons">
          <a class="fallback-btn luma"
             href="https://luma.com/JP-dennouyokocho">
            📅 Lumaでイベントを確認する
          </a>
          <a class="fallback-btn telegram"
             href="https://t.me/+vtz7fj4kjCc5NDQ1">
            ✈ Telegramで最新情報を確認する
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  /* ── Luma設定 ── */
  const LUMA_CALENDAR_ID = 'cal-X9BFj91zWwrWasK';
  const LUMA_EMBED_URL = `https://luma.com/embed/calendar/${LUMA_CALENDAR_ID}/events`;
  const LUMA_PAST_PAGE_URL = `https://luma.com/calendar/${LUMA_CALENDAR_ID}/past-events`;

  // CORS回避用の中継APIを設定してください。
  // 例: const LUMA_PROXY_URL = 'https://your-worker.example.workers.dev';
  const LUMA_PROXY_URL = 'https://luma-proxy.kintsuba24.workers.dev/';

  const frame      = document.getElementById('lumaFrame');
  const loading    = document.getElementById('lumaLoading');
  const fallback   = document.getElementById('lumaFallback');
  const pastEvents = document.getElementById('pastEvents');
  let loadTimer;
  let pastEventsLoaded = false;

  function showLoading() {
    clearTimeout(loadTimer);
    loading.classList.remove('hidden');
    fallback.classList.remove('visible');
  }

  function hideLoading() {
    clearTimeout(loadTimer);
    loading.classList.add('hidden');
  }

  function showFallback(message, url = 'https://luma.com/JP-dennouyokocho') {
    hideLoading();
    frame.style.display = 'none';
    pastEvents.classList.remove('visible');
    fallback.classList.add('visible');
    const messageEl = fallback.querySelector('.fallback-msg');
    const lumaLink = fallback.querySelector('.fallback-btn.luma');
    if (messageEl) messageEl.innerHTML = message;
    if (lumaLink) lumaLink.href = url;
  }

  function startIframeLoad() {
    showLoading();
    fallback.classList.remove('visible');
    pastEvents.classList.remove('visible');
    frame.style.display = 'block';
    frame.addEventListener('load', onIframeLoad, { once: true });
    loadTimer = setTimeout(() => {
      showFallback('イベント情報を読み込めませんでした。<br>以下のリンクから直接ご確認ください。');
    }, 10000);
  }

  function onIframeLoad() {
    hideLoading();
  }

  function getPastEventsUrl() {
    if (!LUMA_PROXY_URL) return '';
    const separator = LUMA_PROXY_URL.includes('?') ? '&' : '?';
    return `${LUMA_PROXY_URL}${separator}calendar_api_id=${encodeURIComponent(LUMA_CALENDAR_ID)}&period=past`;
  }

  function normalizeEvents(payload) {
    const entries = Array.isArray(payload?.entries) ? payload.entries : [];
    return entries
      .map(entry => entry.event || entry)
      .filter(event => event && event.name && event.start_at)
      .sort((a, b) => new Date(b.start_at) - new Date(a.start_at));
  }

  function formatEventDate(value, timezone = 'Asia/Tokyo') {
    const date = new Date(value);
    return new Intl.DateTimeFormat('ja-JP', {
      timeZone: timezone,
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'short',
      hour: '2-digit', minute: '2-digit'
    }).format(date);
  }

  /* ══════════════════════════════════
     セキュリティ：サニタイズ関数
  ══════════════════════════════════ */
  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function safeUrl(url) {
    if (!url) return '';
    return /^https?:\/\//i.test(String(url).trim()) ? String(url).trim() : '';
  }

  function eventUrl(event) {
    if (event.url) {
      const slug = String(event.url).replace(/[^a-zA-Z0-9\-_]/g, '');
      return `https://luma.com/${slug}`;
    }
    return LUMA_PAST_PAGE_URL;
  }

  function renderPastEvents(events) {
    if (!events.length) {
      pastEvents.innerHTML = '<div class="event-empty">過去イベントはまだありません。</div>';
      return;
    }

    pastEvents.innerHTML = `<div class="event-grid">${events.map(event => {
      const cover    = safeUrl(event.cover_url || event.social_image_url)
                       || 'https://images.lumacdn.com/social-images/default-2604.png';
      const venue    = escapeHtml(
                         event.geo_address_json?.city ||
                         event.geo_address_json?.address ||
                         event.location_info?.name || ''
                       );
      const host     = Array.isArray(event.hosts) && event.hosts.length
                       ? event.hosts.map(item => escapeHtml(item.name)).join(' / ')
                       : '';
      const safeName = escapeHtml(event.name);
      const safeLink = eventUrl(event);

      return `
        <a class="event-card" href="${safeLink}" target="_blank" rel="noopener noreferrer">
          <img class="event-cover" src="${cover}" alt="${safeName}のカバー画像" loading="lazy">
          <div class="event-card-body">
            <p class="event-date">${formatEventDate(event.start_at, event.timezone || 'Asia/Tokyo')}</p>
            <h2 class="event-title">${safeName}</h2>
            ${venue ? `<p class="event-meta">${venue}</p>` : ''}
            ${host ? `<p class="event-meta">${host}</p>` : ''}
          </div>
        </a>`;
    }).join('')}</div>`;
  }

  async function loadPastEvents() {
    frame.style.display = 'none';
    fallback.classList.remove('visible');
    pastEvents.classList.add('visible');

    if (pastEventsLoaded) return;

    const url = getPastEventsUrl();
    if (!url) {
      showFallback(
        '過去イベントをHP内に表示するには中継APIのURL設定が必要です。<br>以下のリンクからLumaの過去イベントをご確認ください。',
        LUMA_PAST_PAGE_URL
      );
      return;
    }

    showLoading();
    try {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      renderPastEvents(normalizeEvents(payload));
      pastEventsLoaded = true;
      hideLoading();
    } catch (error) {
      showFallback(
        '過去イベントを読み込めませんでした。<br>以下のリンクからLumaの過去イベントをご確認ください。',
        LUMA_PAST_PAGE_URL
      );
    }
  }

  /* ── タブ切り替え ── */
  function switchTab(type) {
    document.getElementById('tabUpcoming').classList.toggle('active', type === 'upcoming');
    document.getElementById('tabPast').classList.toggle('active', type === 'past');

    if (type === 'past') {
      loadPastEvents();
      return;
    }

    pastEvents.classList.remove('visible');
    frame.src = LUMA_EMBED_URL;
    startIframeLoad();
  }

  /* ── 初期ロード ── */
  startIframeLoad();

  /* ── ハンバーガーメニュー ── */
  const btn    = document.getElementById('menuBtn');
  const drawer = document.getElementById('drawer');

  btn.addEventListener('click', () => {
    const isOpen = drawer.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
  });

  document.addEventListener('click', e => {
    if (!drawer.contains(e.target) && !btn.contains(e.target)) {
      drawer.classList.remove('open');
      btn.classList.remove('open');
    }
  });
</script>
</body>
</html>
