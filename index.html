    /* ══════════════════════════════════
       VARIABLES & RESET

    /* ── canvas (sakura + particles) ── */

    }

    /* ── site wrapper ── */

      align-items: center; justify-content: flex-start;
      padding: 0 2% 2vh;
      position: relative; z-index: 10;
      text-align: center;
    }

    /* ロゴ下まで押し下げるスペーサー（壁紙ロゴは画面の約64%の位置で終わる） */
    .hero-gap {

    .hero-catch {

      text-shadow:
         1px 1px 1px #FF773E, -1px -1px 1px #FF773E,
         -1px 1px 1px #FF773E,  1px -1px 1px #FF773E,

         0px 1px 1px #FF773E,  0px -1px 1px #FF773E;

    .hero-divider {

    .hero-divider::before { left: -16px; }
    .hero-divider::after  { right: -16px; }

.hero-desc {
  width: fit-content;
  margin: 0 auto;
  font-size: clamp(1.1rem, 2.0vw, 1.6rem);
  font-weight: 400;
  line-height: 1.75;
  color: #ffffffe6;

  text-shadow:
     0.3px 0.3px 0.3px #FF773E, -0.3px -0.3px 0.3px #FF773E,
     -0.3px 0.3px 0.3px #FF773E,  0.3px -0.3px 0.3px #FF773E,
     0.3px 0px 0.3px #FF773E, -0.3px  0px 0.3px #FF773E,

}

    /* ══════════════════════════════════

    ══════════════════════════════════ */

      top: 18px;
      right: 20px;
      z-index: 100;
      display: inline-flex;
      align-items: center;

      background: rgba(3, 0, 20, 0.78);

      border-radius: 30px;
      backdrop-filter: blur(10px);

    .join-btn:hover {

        0 0 28px rgba(0, 150, 255, 0.55),
        inset 0 0 22px rgba(0, 150, 255, 0.15);
      text-shadow:
        -1px -1px 0 #cc7700,
         1px -1px 0 #cc7700,
        -1px  1px 0 #cc7700,
         1px  1px 0 #cc7700,
        0 0 18px rgba(0, 220, 255, 0.9);
      transform: translateY(-2px);
    }

    /* ══════════════════════════════════
       BOTTOM NAVIGATION (2×)
    ══════════════════════════════════ */
    .bottom-nav {
      height: var(--nav-h);
      display: flex; align-items: stretch;
      position: relative; z-index: 20;
      background: rgba(3, 0, 12, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

    /* glow line */
    .bottom-nav::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(0, 110, 255, 0.9) 25%,
        rgba(180, 0, 255, 0.9) 75%,
        transparent 100%);
      box-shadow: 0 0 20px rgba(60, 0, 200, 0.55);
    }

    .nav-item {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      color: #fff;
      font-family: 'Shippori Mincho B1', serif;
      font-size: clamp(1rem, 1.8vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    .nav-item::after {
      content: '';
      position: absolute; bottom: 20px;
      left: 25%; right: 25%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      box-shadow: 0 0 10px var(--cyan);
      transform: scaleX(0); transition: transform 0.3s ease;
    }
    .nav-item:hover {
      color: #fff;
      text-shadow: 0 0 12px var(--cyan), 0 0 26px var(--blue);
      background: rgba(0, 50, 200, 0.08);
    }
    .nav-item:hover::after { transform: scaleX(1); }

    .nav-sep {
      width: 1px;
      background: rgba(100, 50, 200, 0.38);
      margin: 40px 0;
    }

    /* ══════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════ */
    @media (max-width: 768px) {
      body {
        overflow: hidden;
        background-image: url('./bg_portrait.jpg');
        background-position: top center;
      }
      /* dvh = ブラウザUIを除いた実効高さ */
      .site-wrapper { height: 100dvh; overflow: hidden; }
      .hero {
        /* overflow:hiddenは付けない → テキストが切り取られる原因になる */
        padding-bottom: var(--nav-h);
      }
      :root { --nav-h: 88px; }
      /* hero-gapをdvh単位に統一（vh=ブラウザUI込みの高さで不一致が起きる） */
      .hero-gap    { min-height: 65dvh; }
      .hero-catch  { font-size: clamp(1rem, 4vw, 1.4rem); letter-spacing: 0.2em; }
      .hero-desc   { font-size: clamp(0.88rem, 3.2vw, 1.15rem); line-height: 1.75; }
      .hero-divider { width: min(78vw, 300px); margin: 0.6rem auto; }
      .nav-item    { font-size: clamp(0.6rem, 2.4vw, 0.85rem); letter-spacing: 0; white-space: nowrap; }
      .nav-sep     { margin: 22px 0; }
      /* fixed: ブラウザ・アプリ内ブラウザ問わず常に画面最下部に固定 */
      .bottom-nav  { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; }
      /* 参加ボタン：モバイルは小さく右上表示 */
      .join-btn    { font-size: 0.7rem; padding: 7px 14px; top: 14px; right: 14px; letter-spacing: 0.08em; }
    }

    @media (max-width: 420px) {
      .hero-catch { font-size: 0.92rem; }
      .hero-desc  { font-size: 0.82rem; }
      .nav-item   { font-size: clamp(0.55rem, 2.2vw, 0.78rem); letter-spacing: 0; white-space: nowrap; }
    }

    /* ラップトップ（高さ900px以下）: navを縮小してオーバーフロー防止 */
    @media (max-height: 900px) and (min-width: 769px) {
      :root { --nav-h: 110px; }
      .nav-sep     { margin: 28px 0; }
      .nav-item::after { bottom: 12px; }
      .hero-catch  { font-size: 1.5rem; }
      .hero-desc   { font-size: 1.2rem; line-height: 1.6; }
      .hero-divider { margin: 0.6rem auto; }
    }

    /* さらに低い高さ（680px以下） */
    @media (max-height: 680px) and (min-width: 769px) {
      :root { --nav-h: 90px; }
      .nav-sep     { margin: 20px 0; }
      .hero-catch  { font-size: 1.3rem; }
      .hero-desc   { font-size: 1rem; line-height: 1.5; }
      .hero-divider { margin: 0.4rem auto; }
      .hero-gap    { min-height: 60vh; }
    }

<body>

<canvas id="bg-canvas"></canvas>

<div class="site-wrapper">

<script>
  /* Sakura + digital particle canvas */
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* Sakura Petal */
  class Petal {
    constructor(preplace) { this.reset(preplace); }
    reset(placed) {
      this.x      = Math.random() * canvas.width;
      this.y      = placed ? Math.random() * canvas.height : -20;
      this.sz     = Math.random() * 5.5 + 2.5;
      this.vx     = (Math.random() - 0.5) * 0.55;
      this.vy     = Math.random() * 1.1 + 0.45;
      this.rot    = Math.random() * Math.PI * 2;
      this.vrot   = (Math.random() - 0.5) * 0.04;
      this.wob    = Math.random() * Math.PI * 2;
      this.wobSpd = Math.random() * 0.018 + 0.008;
      this.alpha  = Math.random() * 0.5 + 0.12;
      const hue   = Math.floor(Math.random() * 35 + 300);
      const sat   = Math.floor(Math.random() * 20 + 70);
      const lum   = Math.floor(Math.random() * 20 + 65);
      this.col    = `hsla(${hue},${sat}%,${lum}%,${this.alpha})`;
    }
    update() {
      this.wob += this.wobSpd;
      this.x   += this.vx + Math.sin(this.wob) * 0.45;
      this.y   += this.vy;
      this.rot += this.vrot;
      if (this.y > canvas.height + 25) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.alpha;
      ctx.fillStyle   = this.col;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.sz, this.sz * 0.52, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = this.alpha * 0.45;
      ctx.fillStyle   = 'rgba(255,215,240,0.85)';
      ctx.beginPath();
      ctx.ellipse(-this.sz * 0.22, -this.sz * 0.16, this.sz * 0.32, this.sz * 0.18, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  /* Digital Particle */
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x     = Math.random() * canvas.width;
      this.y     = Math.random() * canvas.height;
      this.sz    = Math.random() * 1.8;
      this.vx    = (Math.random() - 0.5) * 0.22;
      this.vy    = (Math.random() - 0.5) * 0.22;
      this.life  = Math.random() * 220 + 80;
      this.maxL  = this.life;
      this.alpha = Math.random() * 0.28 + 0.05;
      const cols = ['#0077ff','#00ccff','#aa00ff','#ff44aa','#00ffcc'];
      this.col   = cols[Math.floor(Math.random() * cols.length)];
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.life--;
      if (this.life <= 0) this.reset();
    }
    draw() {
      const a = this.alpha * (this.life / this.maxL);
      ctx.globalAlpha = a;
      ctx.fillStyle   = this.col;
      ctx.shadowBlur  = 7;
      ctx.shadowColor = this.col;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  const petals    = [
    ...Array.from({ length: 28 }, () => new Petal(true)),
    ...Array.from({ length: 36 }, () => new Petal(false)),
  ];
  const particles = Array.from({ length: 45 }, () => new Particle());

  function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    particles.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    petals.forEach(p   => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
  }
  animate();

  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      el.style.background = 'rgba(0,80,220,0.14)';
      setTimeout(() => { el.style.background = ''; }, 180);
    });
  });
</script>
